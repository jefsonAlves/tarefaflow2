name: Build Android App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        
      - name: Type Check (Lint)
        run: npm run lint

      - name: Build Web App
        run: npm run build
        # env:
        #   Se você adicionar variáveis de ambiente importantes no futuro (ex: VITE_API_KEY),
        #   configure-as aqui usando GitHub Secrets, por exemplo:
        #   VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Manual Gradle and Regenerate Wrapper
        working-directory: ./android
        run: |
          wget https://services.gradle.org/distributions/gradle-8.13-bin.zip -P /tmp
          unzip -d /tmp /tmp/gradle-8.13-bin.zip
          /tmp/gradle-8.13/bin/gradle wrapper --gradle-version 8.13 --distribution-type all

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Debug Output
        run: |
          cat android/app/src/main/assets/capacitor.plugins.json || true
          cat android/app/capacitor.build.gradle || true
          cat android/capacitor.settings.gradle || true

      - name: Build Android Debug APK
        working-directory: ./android
        run: |
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Print Debug Signing SHA Fingerprints
        run: |
          echo "===== FIREBASE DEBUG SIGNING FINGERPRINTS ====="
          keytool -list -v \
            -alias androiddebugkey \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -keypass android | grep -E "SHA1:|SHA256:" || true
          echo "===== END FIREBASE DEBUG SIGNING FINGERPRINTS ====="

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/**/*.apk
