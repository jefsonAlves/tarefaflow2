name: Build Android App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        
      - name: Type Check (Lint)
        run: npm run lint

      - name: Build Web App
        run: npm run build
        # env:
        #   Se você adicionar variáveis de ambiente importantes no futuro (ex: VITE_API_KEY),
        #   configure-as aqui usando GitHub Secrets, por exemplo:
        #   VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable and fix Wrapper
        run: |
          chmod +x android/gradlew
          curl -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar

      - name: Build Android Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Build Android Release AAB
        working-directory: ./android
        run: ./gradlew bundleRelease

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/**/*.apk

      - name: Upload Release AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/**/*.aab
